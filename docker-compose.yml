services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: atendimento
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Opcional — só para quem optar por SQS em vez de BullMQ/Redis.
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: sqs
      # URLs de fila no formato path (http://host:4566/000000000000/<nome>) p/ casar com o .env.
      SQS_ENDPOINT_STRATEGY: path
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Simula a Meta WhatsApp Cloud API: dispara webhooks assinados e recebe seus envios.
  mock-meta:
    build: ./mock-meta-server
    ports:
      - "8001:8001"
    environment:
      # Mesmos valores do seu .env — usados para ASSINAR o webhook (HMAC-SHA256).
      META_APP_SECRET: super-secret-app-secret-trocar
      # Entrega os webhooks para a API dentro da rede do compose (caminho 100% dockerizado).
      CANDIDATE_WEBHOOK_URL: http://api:8000/webhook
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── API HTTP (NestJS) ─────────────────────────────────────
  api:
    build: ./backend
    env_file:
      - ./.env
    environment:
      # Overrides de rede (hosts internos do compose têm prioridade sobre o .env).
      PORT: 8000
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/atendimento
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_JOBS_QUEUE_URL: http://localstack:4566/000000000000/atendimento-jobs
      SQS_JOBS_DLQ_URL: http://localstack:4566/000000000000/atendimento-jobs-dlq
      SQS_AUDIT_QUEUE_URL: http://localstack:4566/000000000000/atendimento-audit
      SQS_AUDIT_DLQ_URL: http://localstack:4566/000000000000/atendimento-audit-dlq
      META_API_BASE_URL: ${META_API_BASE_URL:-http://mock-meta:8001}
      KNOWLEDGE_BASE_DIR: /knowledge-base
      ORDER_STATUS_BASE_URL: http://api:8000
    command: sh -c "node dist/db/migrate.js && node dist/db/seed.js && node dist/main.js"
    ports:
      # Porta do HOST configurável (default 8000). Se 8000 estiver ocupada, defina
      # API_HOST_PORT no .env (ex.: 8080). A porta INTERNA continua 8000.
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./knowledge-base:/knowledge-base:ro
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Worker (consumidor SQS: jobs + auditoria) ─────────────
  worker:
    build: ./backend
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/atendimento
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_JOBS_QUEUE_URL: http://localstack:4566/000000000000/atendimento-jobs
      SQS_JOBS_DLQ_URL: http://localstack:4566/000000000000/atendimento-jobs-dlq
      SQS_AUDIT_QUEUE_URL: http://localstack:4566/000000000000/atendimento-audit
      SQS_AUDIT_DLQ_URL: http://localstack:4566/000000000000/atendimento-audit-dlq
      META_API_BASE_URL: ${META_API_BASE_URL:-http://mock-meta:8001}
      KNOWLEDGE_BASE_DIR: /knowledge-base
      # Function calling: o worker consulta o endpoint de pedidos exposto pela API.
      ORDER_STATUS_BASE_URL: http://api:8000
    command: ["node", "dist/worker.js"]
    volumes:
      - ./knowledge-base:/knowledge-base:ro
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  pgdata:
